{% extends 'base.html' %}
{% block title %}Email Sent - EventAI{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-5">
                <div class="display-4 text-success mb-3"><i class="bi bi-envelope-check"></i></div>
                <h4 class="fw-bold mb-3">Check your inbox</h4>
                <p class="text-muted mb-0">We've emailed you instructions for setting your password, if an account exists with the email you entered.</p>
                <p class="text-muted mt-2">You should receive them shortly.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-4">Return to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
