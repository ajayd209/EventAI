{% extends 'base.html' %}
{% block title %}Reset Password - EventAI{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <h4 class="fw-bold mb-3 text-center">Reset your password</h4>
                <p class="text-muted text-center small mb-4">Enter your email address below, and we'll send you a link to reset your password.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Send Reset Link</button>
                </form>
                <div class="text-center mt-3">
                    <small>Remembered your password? <a href="{% url 'accounts:login' %}">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
