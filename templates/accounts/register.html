{% extends 'base.html' %}
{% block title %}Register - EventAI{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-4">
                <h4 class="fw-bold mb-4 text-center">Create an Account</h4>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Register</button>
                </form>
                <div class="text-center mt-3">
                    <small>Already have an account? <a href="{% url 'accounts:login' %}">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
