{% extends 'base.html' %}
{% block title %}Password Reset Complete - EventAI{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-5">
                <div class="display-4 text-success mb-3"><i class="bi bi-check-circle"></i></div>
                <h4 class="fw-bold mb-3">Password Reset Complete</h4>
                <p class="text-muted mb-4">Your password has been set. You may go ahead and log in now.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
