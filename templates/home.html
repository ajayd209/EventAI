{% extends 'base.html' %}

{% block title %}Home - EventAI{% endblock %}

{% block content %}
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="display-4 fw-bold mb-4">Plan Your Perfect Event with <span class="text-primary">AI</span></h1>
            <p class="lead mb-5 text-muted">The world's most advanced AI-powered event management platform. From local meetups to global conferences, we've got you covered.</p>
            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
                <a href="{% url 'ai_engine:create_event_ai' %}" class="btn btn-primary btn-lg px-4 gap-3">Get Started</a>
                <button type="button" class="btn btn-outline-secondary btn-lg px-4">Learn More</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
